version: "2"
run:
  go: "1.26"
linters:
  enable:
    - gocritic
    - gosec
    - paralleltest
    - reassign
    - revive
    - thelper
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
    gosec:
      excludes:
        - G101
    govet:
      enable:
        - shadow
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - paralleltest
        path: _test\.go
      - linters:
          - gosec
        path: _test\.go
      - linters:
          - thelper
        path: cmd/.*_test\.go
      - linters:
          - errcheck
          - gosec
        path: tools/
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
