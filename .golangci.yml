version: "2"
run:
  go: "1.26"
linters:
  enable:
    - gocritic
    - gosec
    - paralleltest
    - reassign
    - revive
    - thelper
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
    gosec:
      excludes:
        - G101
        - G115
        - G117
        - G306
        - G404
        - G703
        - G705
    govet:
      enable:
        - shadow
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
    revive:
      rules:
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - paralleltest
        path: _test\.go
      - linters:
          - gosec
        path: _test\.go
      - linters:
          - thelper
        path: cmd/.*_test\.go
      - linters:
          - errcheck
          - gosec
        path: tools/
      - linters:
          - revive
        path: pkg/server/config\.go
      - linters:
          - revive
        path: pkg/tunnel/p2p/p2p\.go
      - linters:
          - revive
        path: pkg/tunnel/xfer/internal/tcp/tcp\.go
      - linters:
          - revive
        path: pkg/server/metrics_test_extra\.go
      - linters:
          - errcheck
        path: pkg/tunnel/tunnel_mux\.go
      - linters:
          - errcheck
        path: pkg/server/handlers\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
