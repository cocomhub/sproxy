addr: ":18083"
uploads_dir: "./uploads"
# tunnel_key 留空时 sproxy 自动生成 64 位 hex 密钥并回写到配置文件
# 可通过 `sclient genkey` 手动生成
# tunnel_key: ""

server_timeouts:
  read_header: "5s"
  read: "30s"
  write: "30s"
  idle: "60s"
log_level: "info"
log_format: "text"
max_header_bytes: 1048576

# TLS 配置（默认关闭）
# tls:
#   enabled: true
#   cert_file: "certs/_wildcard.sproxy.local.pem"
#   key_file: "certs/_wildcard.sproxy.local-key.pem"

# Bearer Token 认证（默认关闭，留空 = 无认证）
# auth_token: "your-secret-token"

# 速率限制（默认关闭；enabled: true 时限制 tunnel handler）
# rate_limit:
#   enabled: false
#   requests: 10
#   window: "1s"

# 分块上传设置
# chunk_size: 4194304               # 每块大小 (4MB)
# max_chunk_upload_bytes: 8388608   # 单块请求体最大限制 (8MB)
# upload_session_ttl: "24h"         # 未完成上传会话保留时间
