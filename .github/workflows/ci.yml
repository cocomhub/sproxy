name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.editorconfig'
      - '.notestignore'
      - '.dockerignore'
      - '.golangci.yml.bak'
      - 'LICENSE'
  pull_request:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.editorconfig'
      - '.notestignore'
      - '.dockerignore'
      - '.golangci.yml.bak'
      - 'LICENSE'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m ./...

  test:
    name: Test (Go ${{ matrix.go }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ["1.26"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Ensure make (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install make -y

      - name: go vet
        run: make vet

      - name: go test (race)
        run: make test

      - name: go test (coverage)
        run: make cover-check
        if: matrix.os == 'ubuntu-latest'

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: build/cover.out
        if: matrix.os == 'ubuntu-latest'

      - name: Upload coverage to CodeCov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: build/cover.out
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        if: matrix.os == 'ubuntu-latest'

  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build sproxy + sclient
        run: make build-ci GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Build all sub-modules
        run: make build-all

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: write   # auto-push 需要
      deployments: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          check-latest: true
      - name: Run benchmark
        run: make bench
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@8358ad9c7f2ffcd73b6dc0f96defe1d0292cab03 # v1.11.0
        continue-on-error: true
        with:
          tool: 'go'
          output-file-path: build/bench/output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '100%'
          comment-on-alert: true
          fail-on-alert: false
          skip-fetch-gh-pages: true
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: build/bench/
          retention-days: 3

  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: go test (coverage)
        run: make cover-check

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
