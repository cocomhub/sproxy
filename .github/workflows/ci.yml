name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m ./...

  test:
    name: Test (Go ${{ matrix.go }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ["1.26"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

      - name: go test (coverage)
        run: go test -count=1 -coverprofile=cover.out ./...
        if: matrix.os == 'ubuntu-latest'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: cover.out
        if: matrix.os == 'ubuntu-latest'

  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build sproxy + sclient
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o build/bin/sproxy-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/sproxy/
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o build/bin/sclient-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/sclient/

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: Run benchmark
        run: |
          mkdir -p build/benchmark/data
          go test -bench=. -benchmem -count=1 \
            ./pkg/server/... \
            ./pkg/client/... \
            ./pkg/tunnel/mux/... \
            2>&1 > build/benchmark/data/ci-$(git rev-parse --short HEAD).txt
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: build/benchmark/
