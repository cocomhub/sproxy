<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sproxy 文件管理</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" id="app">
  <h1>sproxy 文件管理</h1>
  <div class="auth-bar">
    <label for="token">Token:</label>
    <input type="password" id="token" placeholder="可选，输入 Bearer Token">
    <button type="button" id="save-token-btn" onclick="saveToken()">保存</button>
    <label for="tunnel-key" style="margin-left:16px;">Tunnel Key:</label>
    <input type="password" id="tunnel-key" placeholder="64位 hex 密钥，可选" style="flex:1.5;">
    <button type="button" id="save-tunnel-key-btn" onclick="saveTunnelKey()">保存</button>
  </div>
  <div class="toolbar">
    <label class="btn btn-primary" for="file-input" id="upload-btn-label">上传文件</label>
    <input type="file" id="file-input" multiple style="display:none" onchange="uploadFiles(this.files)">
    <button type="button" id="refresh-btn" class="btn btn-secondary" onclick="refreshList()">刷新列表</button>
    <input type="text" id="search-input" placeholder="搜索文件…" aria-label="搜索文件" style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:14px;flex:1;min-width:160px;" onkeydown="if(event.key==='Enter') searchFiles()">
    <button type="button" id="search-btn" class="btn btn-primary" onclick="searchFiles()">搜索</button>
    <button type="button" class="btn btn-secondary" id="clear-search-btn" onclick="clearSearch()" style="display:none;">清除搜索</button>
    <button type="button" id="stats-btn" class="btn btn-secondary" onclick="showStats()">监控</button>
    <button type="button" id="cloud-btn" class="btn btn-primary" onclick="showCloudDownload()">云端下载</button>
  </div>
  <div id="batch-toolbar">
    <span id="batch-count">已选 0 个文件</span>
    <button type="button" id="batch-delete-btn" class="btn btn-danger btn-sm" onclick="batchDelete()">批量删除</button>
    <button type="button" id="batch-rename-btn" class="btn btn-warning btn-sm" onclick="batchRename()">批量重命名</button>
    <button type="button" id="batch-archive-btn" class="btn btn-primary btn-sm" onclick="batchDownloadArchive()">下载归档</button>
    <button type="button" id="batch-clear-btn" class="btn btn-secondary btn-sm" onclick="clearSelection()">取消选择</button>
  </div>
  <div id="dir-bar" style="margin-bottom:12px;padding:6px 12px;background:#f0f4ff;border-radius:4px;font-size:14px;display:flex;align-items:center;gap:8px;">
    <strong>目录：</strong><span id="dir-breadcrumb" style="flex:1;"><button type="button" class="breadcrumb-btn" onclick="navigateDir('')">/</button></span>
    <input type="text" id="new-dir-name" placeholder="新建目录名" aria-label="新建目录名" style="padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;width:150px;">
    <button type="button" id="mkdir-btn" class="btn btn-sm btn-primary" onclick="mkdirDir()">新建</button>
  </div>
  <div id="upload-progress-container"></div>
  <div id="resume-container" style="margin-bottom:8px;display:none;"></div>
  <div id="file-list">
    <div class="empty-msg">加载中...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<div id="stats-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:8px;padding:24px;width:420px;max-width:92vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="margin:0;font-size:16px;">服务器监控</h3>
      <button type="button" id="stats-close-btn" onclick="hideStats()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1;">&times;</button>
    </div>
    <div id="stats-body"></div>
    <div style="margin-top:16px;text-align:right;">
      <button type="button" id="stats-refresh-btn" class="btn btn-secondary" onclick="showStats()" style="margin-right:8px;">刷新</button>
      <button type="button" id="stats-close-modal-btn" class="btn btn-primary" onclick="hideStats()">关闭</button>
    </div>
  </div>
</div>

<!-- 云端下载弹窗 -->
<div id="cloud-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:8px;padding:24px;width:600px;max-width:92vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="margin:0;font-size:16px;">云端下载</h3>
      <button type="button" id="cloud-close-btn" onclick="hideCloudDownload()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1;">&times;</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <input type="text" id="cloud-url" placeholder="输入 HTTP/HTTPS 下载链接" aria-label="下载链接" style="flex:1;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;" onkeydown="if(event.key==='Enter') createCloudTask()">
      <button type="button" id="cloud-create-btn" class="btn btn-primary" onclick="createCloudTask()">开始下载</button>
    </div>
    <div id="cloud-tasks-body" style="max-height:400px;overflow-y:auto;">
      <div class="empty-msg">暂无下载任务</div>
    </div>
    <div style="margin-top:12px;text-align:right;">
      <button type="button" id="cloud-refresh-btn" class="btn btn-secondary" onclick="refreshCloudTasks()" style="margin-right:8px;">刷新</button>
      <button type="button" id="cloud-close-modal-btn" class="btn btn-primary" onclick="hideCloudDownload()">关闭</button>
    </div>
  </div>
</div>

<script src="sha256.js"></script>
<script src="tunnel.js"></script>
<script src="upload.js"></script>
<script src="app.js"></script>
</body>
</html>
