<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sproxy 文件管理</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" id="app">
  <h1>sproxy 文件管理</h1>
  <div class="auth-bar">
    <label for="token">Token:</label>
    <input type="password" id="token" placeholder="可选，输入 Bearer Token">
    <button type="button" id="save-token-btn">保存</button>
    <label for="tunnel-key" style="margin-left:16px;">Tunnel Key:</label>
    <input type="password" id="tunnel-key" placeholder="64位 hex 密钥，可选" style="flex:1.5;">
    <button type="button" id="save-tunnel-key-btn">保存</button>
  </div>
  <div class="toolbar">
    <label class="btn btn-primary" for="file-input" id="upload-btn-label">上传文件</label>
    <input type="file" id="file-input" multiple style="display:none">
    <button type="button" id="refresh-btn" class="btn btn-secondary">刷新列表</button>
    <input type="text" id="search-input" placeholder="搜索文件…" aria-label="搜索文件" style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:14px;flex:1;min-width:160px;">
    <button type="button" id="search-btn" class="btn btn-primary">搜索</button>
    <button type="button" class="btn btn-secondary" id="clear-search-btn" style="display:none;">清除搜索</button>
    <button type="button" id="stats-btn" class="btn btn-secondary">监控</button>
    <button type="button" id="cloud-btn" class="btn btn-primary">云端下载</button>
    <button type="button" id="version-btn" class="btn btn-secondary">版本管理</button>
    <button type="button" id="theme-toggle-btn" class="btn btn-secondary" title="切换暗色模式">🌙</button>
  </div>
  <div id="batch-toolbar">
    <span id="batch-count">已选 0 个文件</span>
    <button type="button" id="batch-delete-btn" class="btn btn-danger btn-sm">批量删除</button>
    <button type="button" id="batch-rename-btn" class="btn btn-warning btn-sm">批量重命名</button>
    <button type="button" id="batch-archive-btn" class="btn btn-primary btn-sm">下载归档</button>
    <button type="button" id="batch-clear-btn" class="btn btn-secondary btn-sm">取消选择</button>
  </div>
  <div id="dir-bar" style="margin-bottom:12px;padding:6px 12px;background:#f0f4ff;border-radius:4px;font-size:14px;display:flex;align-items:center;gap:8px;">
    <strong>目录：</strong><span id="dir-breadcrumb" style="flex:1;"><button type="button" class="breadcrumb-btn" id="breadcrumb-root-btn">/</button></span>
    <input type="text" id="new-dir-name" placeholder="新建目录名" aria-label="新建目录名" style="padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;width:150px;">
    <button type="button" id="mkdir-btn" class="btn btn-sm btn-primary">新建</button>
  </div>
  <div id="upload-progress-container"></div>
  <div id="resume-container" style="margin-bottom:8px;display:none;"></div>
  <div id="file-list">
    <div class="empty-msg">加载中...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<div id="stats-modal" style="display:none;position:fixed;inset:0;background:var(--modal-overlay);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:var(--modal-bg);border-radius:8px;padding:24px;width:500px;max-width:92vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="margin:0;font-size:16px;">服务器监控</h3>
      <button type="button" id="stats-close-btn" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1;">&times;</button>
    </div>
    <div id="stats-tab-bar" style="display:flex;gap:0;margin-bottom:12px;border-bottom:2px solid #e0e0e0;">
      <button type="button" id="stats-tab" class="stats-tab active" style="padding:8px 16px;border:none;background:none;cursor:pointer;border-bottom:2px solid #4a90d9;margin-bottom:-2px;font-size:14px;color:#333;">统计</button>
      <button type="button" id="config-tab" class="stats-tab" style="padding:8px 16px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-size:14px;color:#666;">配置</button>
      <button type="button" id="hub-tab" class="stats-tab" style="padding:8px 16px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-size:14px;color:#666;">Hub</button>
    </div>
    <div id="stats-panel"></div>
    <div id="config-panel" style="display:none;"></div>
    <div id="hub-panel" style="display:none;"></div>
    <div style="margin-top:16px;text-align:right;">
      <button type="button" id="stats-refresh-btn" class="btn btn-secondary" style="margin-right:8px;">刷新</button>
      <button type="button" id="stats-close-modal-btn" class="btn btn-primary">关闭</button>
    </div>
  </div>
</div>

<!-- 云端下载弹窗 -->
<div id="cloud-modal" style="display:none;position:fixed;inset:0;background:var(--modal-overlay);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:var(--modal-bg);border-radius:8px;padding:24px;width:600px;max-width:92vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="margin:0;font-size:16px;">云端下载</h3>
      <button type="button" id="cloud-close-btn" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1;">&times;</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <textarea id="cloud-url" placeholder="输入下载链接，每行一个..." aria-label="下载链接" rows="3" style="flex:1;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;resize:vertical;font-family:inherit;"></textarea>
      <button type="button" id="cloud-create-btn" class="btn btn-primary">开始下载</button>
    </div>
    <div id="cloud-tasks-body" style="max-height:400px;overflow-y:auto;">
      <div class="empty-msg">暂无下载任务</div>
    </div>
    <div style="margin-top:12px;text-align:right;">
      <button type="button" id="cloud-refresh-btn" class="btn btn-secondary" style="margin-right:8px;">刷新</button>
      <button type="button" id="cloud-close-modal-btn" class="btn btn-primary">关闭</button>
    </div>
  </div>
</div>

<!-- 分享管理弹窗 -->
<div id="share-modal" style="display:none;position:fixed;inset:0;background:var(--modal-overlay);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:var(--modal-bg);border-radius:8px;padding:24px;width:600px;max-width:92vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="margin:0;font-size:16px;">分享管理</h3>
      <button type="button" id="share-close-btn" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1;">&times;</button>
    </div>
    <div id="share-tab-bar" style="display:flex;gap:0;margin-bottom:12px;border-bottom:2px solid #e0e0e0;">
      <button type="button" id="share-create-tab" class="share-tab active" style="padding:8px 16px;border:none;background:none;cursor:pointer;border-bottom:2px solid #4a90d9;margin-bottom:-2px;font-size:14px;color:#333;">创建分享</button>
      <button type="button" id="share-list-tab" class="share-tab" style="padding:8px 16px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-size:14px;color:#666;">管理分享</button>
    </div>
    <div id="share-create-panel">
      <div style="margin-bottom:12px;">
        <label style="display:block;margin-bottom:4px;font-size:13px;color:#555;">文件名</label>
        <input type="text" id="share-filename" placeholder="输入文件名..." style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;box-sizing:border-box;">
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <div style="flex:1;">
          <label style="display:block;margin-bottom:4px;font-size:13px;color:#555;">有效期</label>
          <input type="text" id="share-ttl" value="24h" placeholder="如 1h, 24h, 7d" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;box-sizing:border-box;">
        </div>
        <div style="flex:1;">
          <label style="display:block;margin-bottom:4px;font-size:13px;color:#555;">最大下载次数</label>
          <input type="number" id="share-max-downloads" value="0" min="0" placeholder="0=不限" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;box-sizing:border-box;">
        </div>
      </div>
      <div style="margin-bottom:12px;">
        <label><input type="checkbox" id="share-one-time"> 一次性分享（下载一次后自动失效）</label>
      </div>
      <button type="button" id="share-create-btn" class="btn btn-primary" style="width:100%;">创建分享链接</button>
    </div>
    <div id="share-list-panel" style="display:none;">
      <div id="share-list-body" style="max-height:400px;overflow-y:auto;">
        <div class="empty-msg">暂无分享链接</div>
      </div>
      <div style="margin-top:12px;text-align:right;">
        <button type="button" id="share-list-refresh-btn" class="btn btn-secondary" style="margin-right:8px;">刷新</button>
      </div>
    </div>
  </div>
</div>

<!-- 版本管理弹窗 -->
<div id="version-modal" style="display:none;position:fixed;inset:0;background:var(--modal-overlay);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:var(--modal-bg);border-radius:8px;padding:24px;width:600px;max-width:92vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="margin:0;font-size:16px;">文件版本管理</h3>
      <button type="button" id="version-close-btn" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1;">&times;</button>
    </div>
    <div style="margin-bottom:12px;display:flex;gap:8px;">
      <input type="text" id="version-filename" placeholder="输入文件名查看版本历史..." aria-label="文件名" style="flex:1;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;">
      <button type="button" id="version-load-btn" class="btn btn-primary">查看版本</button>
    </div>
    <div id="version-body" style="max-height:400px;overflow-y:auto;">
      <div class="empty-msg">输入文件名查看版本历史</div>
    </div>
    <div style="margin-top:12px;text-align:right;">
      <button type="button" id="version-close-modal-btn" class="btn btn-primary">关闭</button>
    </div>
  </div>
</div>

<script src="sha256.js"></script>
<script src="tunnel.js"></script>
<script src="upload.js"></script>
<script src="app.js"></script>
</body>
</html>
