<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sproxy 文件管理</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 20px; background: #f5f7fa; color: #333; }
.container { max-width: 1000px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 24px; }
h1 { margin: 0 0 20px; font-size: 24px; }
.auth-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding: 12px; background: #f0f4ff; border-radius: 6px; }
.auth-bar label { font-weight: 600; font-size: 14px; white-space: nowrap; }
.auth-bar input { flex: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
.auth-bar button { padding: 6px 16px; background: #4a90d9; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
.auth-bar button:hover { background: #357abd; }
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
.btn-primary { background: #4a90d9; color: #fff; }
.btn-primary:hover { background: #357abd; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-secondary { background: #95a5a6; color: #fff; }
.btn-secondary:hover { background: #7f8c8d; }
.btn-sm { padding: 4px 10px; font-size: 13px; }
.btn:disabled { opacity: .6; cursor: not-allowed; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
th { font-weight: 600; background: #f8f9fa; white-space: nowrap; }
tr:hover td { background: #f8f9fa; }
.file-actions { display: flex; gap: 6px; }
.empty-msg { text-align: center; color: #999; padding: 40px 0; }
.upload-progress { margin: 8px 0; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
.upload-progress-bar { height: 100%; background: #4a90d9; width: 0; transition: width .3s; }
.overflow-dots { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.checksum-cell { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 13px; cursor: pointer; color: #555; display: inline-flex; align-items: center; gap: 4px; }
.checksum-cell:hover { color: #333; }
.checksum-cell .copy-icon { opacity: .4; font-size: 12px; }
.checksum-cell:hover .copy-icon { opacity: .8; }
.toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; color: #fff; font-size: 14px; opacity: 0; transition: opacity .3s; z-index: 999; }
.toast.show { opacity: 1; }
.toast-success { background: #27ae60; }
.toast-error { background: #e74c3c; }
.toast-warning { background: #f39c12; }
.size-cell { white-space: nowrap; }
.chunk-progress-text { font-size: 12px; color: #666; margin-top: 2px; }
</style>
</head>
<body>
<div class="container" id="app">
  <h1>sproxy 文件管理</h1>
  <div class="auth-bar">
    <label for="token">Token:</label>
    <input type="password" id="token" placeholder="可选，输入 Bearer Token">
    <button onclick="saveToken()">保存</button>
    <label for="tunnel-key" style="margin-left:16px;">Tunnel Key:</label>
    <input type="password" id="tunnel-key" placeholder="64位 hex 密钥，可选" style="flex:1.5;">
    <button onclick="saveTunnelKey()">保存</button>
  </div>
  <div class="toolbar">
    <label class="btn btn-primary" for="file-input" id="upload-btn-label">上传文件</label>
    <input type="file" id="file-input" multiple style="display:none" onchange="uploadFiles(this.files)">
    <label class="btn btn-secondary" style="cursor:pointer">
      <input type="checkbox" id="chunked-toggle" checked onchange="saveChunkedPref()"> 分块上传
    </label>
    <button class="btn btn-secondary" onclick="refreshList()">刷新列表</button>
    <span id="upload-hash-status" style="font-size:13px;color:#999;margin-left:8px;"></span>
  </div>
  <div id="dir-bar" style="margin-bottom:12px;padding:6px 12px;background:#f0f4ff;border-radius:4px;font-size:14px;display:flex;align-items:center;gap:8px;">
    <strong>目录：</strong><span id="dir-breadcrumb" style="flex:1;"><a href="javascript:void(0)" onclick="navigateDir('')">/</a></span>
    <input type="text" id="new-dir-name" placeholder="新建目录名" style="padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;width:150px;">
    <button class="btn btn-sm btn-primary" onclick="mkdirDir()">新建</button>
  </div>
  <div id="upload-progress-container"></div>
  <div id="file-list">
    <div class="empty-msg">加载中...</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const BASE = '';
let token = localStorage.getItem('sproxy_token') || '';
let tunnelHexKey = localStorage.getItem('sproxy_tunnel_key') || '';
let chunkedPref = localStorage.getItem('sproxy_chunked') !== 'false'; // 默认启用
let currentSubdir = ''; // 当前浏览的子目录
document.getElementById('token').value = token;
document.getElementById('tunnel-key').value = tunnelHexKey;
document.getElementById('chunked-toggle').checked = chunkedPref;

// 缓存导入的 CryptoKey，避免重复导入
let _tunnelCryptoKey = null;

function saveToken() {
  token = document.getElementById('token').value;
  localStorage.setItem('sproxy_token', token);
  showToast('Token 已保存', 'success');
}

function saveTunnelKey() {
  tunnelHexKey = document.getElementById('tunnel-key').value;
  localStorage.setItem('sproxy_tunnel_key', tunnelHexKey);
  _tunnelCryptoKey = null; // 清除缓存，下次重新导入
  showToast('Tunnel Key 已保存', 'success');
}

function saveChunkedPref() {
  chunkedPref = document.getElementById('chunked-toggle').checked;
  localStorage.setItem('sproxy_chunked', chunkedPref);
}

// --- 隧道加解密 ---
async function getTunnelCryptoKey() {
  if (!tunnelHexKey) return null;
  if (_tunnelCryptoKey) return _tunnelCryptoKey;
  const raw = hexToBytes(tunnelHexKey);
  if (raw.length !== 32) {
    showToast('Tunnel Key 必须为 64 位 hex', 'error');
    return null;
  }
  _tunnelCryptoKey = await crypto.subtle.importKey('raw', raw, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
  return _tunnelCryptoKey;
}

function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2) {
    bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
  }
  return bytes;
}

function bytesToHex(bytes) {
  return Array.from(new Uint8Array(bytes)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function tunnelRequest(method, urlPath, headersObj, bodyBytes) {
  const key = await getTunnelCryptoKey();
  if (!key) throw new Error('未配置有效的 Tunnel Key');

  // 构造请求元数据
  const meta = { method: method, url: urlPath, headers: {} };
  if (headersObj) {
    for (const [k, v] of Object.entries(headersObj)) {
      if (k !== 'Authorization') meta.headers[k] = v; // 隧道模式下不发送 Bearer Token
    }
  }

  // 序列化：4B metaLen + encrypted(metaJSON) + encrypted(body as a single chunk)
  const metaJSON = new TextEncoder().encode(JSON.stringify(meta));
  const metaIV = crypto.getRandomValues(new Uint8Array(12));
  const metaCT = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: metaIV }, key, metaJSON);
  const metaFrame = new Uint8Array(4 + metaIV.length + metaCT.byteLength);
  const dv = new DataView(metaFrame.buffer);
  dv.setUint32(0, metaIV.length + metaCT.byteLength, false); // big-endian
  metaFrame.set(metaIV, 4);
  metaFrame.set(new Uint8Array(metaCT), 4 + metaIV.length);

  // 加密 body
  let bodyFrame = new Uint8Array(0);
  if (bodyBytes && bodyBytes.byteLength > 0) {
    const bodyIV = crypto.getRandomValues(new Uint8Array(12));
    const bodyCT = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: bodyIV }, key, bodyBytes);
    bodyFrame = new Uint8Array(4 + bodyIV.length + bodyCT.byteLength);
    const bdv = new DataView(bodyFrame.buffer);
    bdv.setUint32(0, bodyIV.length + bodyCT.byteLength, false);
    bodyFrame.set(bodyIV, 4);
    bodyFrame.set(new Uint8Array(bodyCT), 4 + bodyIV.length);
  }

  // 合并发送
  const fullBody = new Uint8Array(metaFrame.length + bodyFrame.length);
  fullBody.set(metaFrame, 0);
  fullBody.set(bodyFrame, metaFrame.length);

  const resp = await fetch(BASE + '/tunnel', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-tunnel-frame' },
    body: fullBody
  });
  if (!resp.ok) {
    throw new Error('隧道请求失败: HTTP ' + resp.status);
  }

  // 读取完整响应体
  const respArrayBuf = await resp.arrayBuffer();
  const respBytes = new Uint8Array(respArrayBuf);

  // 解析响应 metadata
  if (respBytes.length < 4) throw new Error('响应数据不足');
  const respMetaLen = new DataView(respBytes.buffer).getUint32(0, false);
  const respMetaEnc = respBytes.slice(4, 4 + respMetaLen);

  const respMetaIV = respMetaEnc.slice(0, 12);
  const respMetaCT = respMetaEnc.slice(12);
  const respMetaPlain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: respMetaIV }, key, respMetaCT);
  const respMeta = JSON.parse(new TextDecoder().decode(respMetaPlain));

  // 解析响应 body
  const bodyStart = 4 + respMetaLen;
  let respBody = new Uint8Array(0);
  let offset = bodyStart;
  while (offset + 4 <= respBytes.length) {
    const bLen = new DataView(respBytes.buffer, offset).getUint32(0, false);
    if (bLen === 0 || offset + 4 + bLen > respBytes.length) break;
    const bEnc = respBytes.slice(offset + 4, offset + 4 + bLen);
    if (bEnc.length > 0) {
      const bIV = bEnc.slice(0, 12);
      const bCT = bEnc.slice(12);
      const chunk = new Uint8Array(await crypto.subtle.decrypt({ name: 'AES-GCM', iv: bIV }, key, bCT));
      const merged = new Uint8Array(respBody.length + chunk.length);
      merged.set(respBody, 0);
      merged.set(chunk, respBody.length);
      respBody = merged;
    }
    offset += 4 + bLen;
  }

  return {
    status: respMeta.status,
    headers: respMeta.headers || {},
    body: respBody
  };
}

function headers(extra) {
  const h = extra || {};
  if (token && !tunnelHexKey) h['Authorization'] = 'Bearer ' + token;
  return h;
}

// --- Web Crypto SHA-256 ---
async function computeSHA256(file) {
  const buffer = await file.arrayBuffer();
  const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function computeSHA256Blob(blob) {
  const buffer = await blob.arrayBuffer();
  const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function getChecksumPrefix(cs) {
  if (!cs) return '-';
  return cs.substring(0, 16) + '…';
}

function copyChecksum(cs) {
  navigator.clipboard.writeText(cs).then(function() {
    showToast('Checksum 已复制到剪贴板', 'success');
  }).catch(function() {
    showToast('复制失败', 'error');
  });
}

const CHUNK_SIZE = 4 * 1024 * 1024; // 4 MiB
const AUTO_CHUNK_THRESHOLD = 100 * 1024 * 1024; // 100 MiB

// --- 分块上传 ---
async function chunkedUpload(file, tunnelMode) {
  const totalSize = file.size;
  const totalChunks = Math.ceil(totalSize / CHUNK_SIZE);
  const fileName = currentSubdir ? currentSubdir + '/' + file.name : file.name;

  const progId = 'prog-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  const container = document.getElementById('upload-progress-container');
  container.insertAdjacentHTML('beforeend',
    '<div id="' + progId + '-wrap"><small>' + escHtml(fileName) + ' (' + formatSize(totalSize) + ', ' + totalChunks + ' 分块)</small>' +
    '<div class="upload-progress"><div class="upload-progress-bar" id="' + progId + '"></div></div>' +
    '<div class="chunk-progress-text" id="' + progId + '-text">计算 SHA-256…</div></div>');

  function updateProg(loaded, total, chunkIdx) {
    const pct = total > 0 ? (loaded / total * 100) : 0;
    document.getElementById(progId).style.width = pct + '%';
    document.getElementById(progId + '-text').textContent =
      Math.round(pct) + '%（分块 ' + (chunkIdx + 1) + '/' + totalChunks + ', ' + formatSize(loaded) + '/' + formatSize(total) + '）';
  }

  // 计算完整文件 SHA-256
  let fileChecksum;
  try {
    fileChecksum = await computeSHA256(file);
  } catch (e) {
    showToast(fileName + ' SHA-256 计算失败: ' + e.message, 'error');
    return;
  }

  try {
    // 初始化分块上传
    let initResult;
    if (tunnelMode) {
      const initResp = await tunnelRequest('POST', '/upload/init',
        { 'Content-Type': 'application/json' },
        new TextEncoder().encode(JSON.stringify({
          filename: fileName,
          total_size: totalSize,
          chunk_size: CHUNK_SIZE,
          total_chunks: totalChunks,
          file_checksum: fileChecksum
        }))
      );
      initResult = JSON.parse(new TextDecoder().decode(initResp.body));
    } else {
      const resp = await fetch(BASE + '/upload/init', {
        method: 'POST',
        headers: headers({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({
          filename: fileName,
          total_size: totalSize,
          chunk_size: CHUNK_SIZE,
          total_chunks: totalChunks,
          file_checksum: fileChecksum
        })
      });
      initResult = await resp.json();
    }

    if (!initResult.success) {
      showToast(fileName + ' 初始化失败: ' + (initResult.message || 'unknown'), 'error');
      return;
    }

    if (initResult.upload_id === 'already_exists') {
      showToast(fileName + ' 已存在，跳过', 'success');
      return;
    }

    const uploadId = initResult.upload_id;
    let uploadedBytes = 0;

    // 上传每个分块
    for (let i = 0; i < totalChunks; i++) {
      const start = i * CHUNK_SIZE;
      const end = Math.min(start + CHUNK_SIZE, totalSize);
      const chunkBlob = file.slice(start, end);

      const chunkChecksum = await computeSHA256Blob(chunkBlob);

      // 上传（含重试）
      let success = false;
      for (let retry = 0; retry < 3 && !success; retry++) {
        const chunkBytes = await chunkBlob.arrayBuffer();

        // 构造 multipart
        const formData = new FormData();
        formData.append('upload_id', uploadId);
        formData.append('chunk_index', String(i));
        formData.append('chunk_checksum', chunkChecksum);
        formData.append('chunk', new Blob([chunkBytes]), String(i).padStart(5, '0') + '.chunk');

        let result;
        if (tunnelMode) {
          // 隧道模式：构造 multipart body 发送
          const boundary = '----WebKitFormBoundary' + Math.random().toString(36).slice(2, 10);
          const encoder = new TextEncoder();
          const headerStr = '--' + boundary + '\r\nContent-Disposition: form-data; name="upload_id"\r\n\r\n' + uploadId + '\r\n';
          const idxStr = '--' + boundary + '\r\nContent-Disposition: form-data; name="chunk_index"\r\n\r\n' + i + '\r\n';
          const csStr = '--' + boundary + '\r\nContent-Disposition: form-data; name="chunk_checksum"\r\n\r\n' + chunkChecksum + '\r\n';
          const fileHeader = '--' + boundary + '\r\nContent-Disposition: form-data; name="chunk"; filename="' + String(i).padStart(5, '0') + '.chunk"\r\nContent-Type: application/octet-stream\r\n\r\n';
          const footer = '\r\n--' + boundary + '--\r\n';
          const parts = [
            encoder.encode(headerStr), encoder.encode(idxStr), encoder.encode(csStr),
            encoder.encode(fileHeader), new Uint8Array(chunkBytes), encoder.encode(footer)
          ];
          const totalLen = parts.reduce((s, p) => s + p.byteLength, 0);
          const fullBody = new Uint8Array(totalLen);
          let off = 0;
          for (const p of parts) { fullBody.set(p, off); off += p.byteLength; }

          const treq = await tunnelRequest('POST', '/upload/chunk',
            { 'Content-Type': 'multipart/form-data; boundary=' + boundary }, fullBody);
          result = JSON.parse(new TextDecoder().decode(treq.body));
        } else {
          const resp = await fetch(BASE + '/upload/chunk', {
            method: 'POST',
            headers: headers({}),
            body: formData
          });
          result = await resp.json();
        }

        if (result.success) {
          success = true;
          uploadedBytes += chunkBlob.size;
          updateProg(uploadedBytes, totalSize, i);
        } else if (!result.should_retry) {
          showToast(fileName + ' 分块 ' + i + ' 上传失败: ' + (result.message || 'unknown'), 'error');
          return;
        }
        // should_retry: 继续循环
      }

      if (!success) {
        showToast(fileName + ' 分块 ' + i + ' 上传失败（重试耗尽）', 'error');
        return;
      }
    }

    // 完成上传
    let completeResult;
    if (tunnelMode) {
      const cresp = await tunnelRequest('POST', '/upload/complete',
        { 'Content-Type': 'application/json' },
        new TextEncoder().encode(JSON.stringify({ upload_id: uploadId }))
      );
      completeResult = JSON.parse(new TextDecoder().decode(cresp.body));
    } else {
      const resp = await fetch(BASE + '/upload/complete', {
        method: 'POST',
        headers: headers({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ upload_id: uploadId })
      });
      completeResult = await resp.json();
    }

    if (completeResult.success) {
      showToast(fileName + ' 上传成功，校验通过', 'success');
    } else {
      showToast(fileName + ' 合并失败: ' + (completeResult.message || 'unknown'), 'error');
      return;
    }
  } catch (e) {
    showToast(fileName + ' 分块上传失败: ' + e.message, 'error');
  }
}

// --- 上传（入口）---
async function uploadFiles(files) {
  if (!files || files.length === 0) return;
  const container = document.getElementById('upload-progress-container');
  const hashStatus = document.getElementById('upload-hash-status');

  for (const file of files) {
    const useChunked = chunkedPref || file.size > AUTO_CHUNK_THRESHOLD;

    if (useChunked) {
      await chunkedUpload(file, !!tunnelHexKey);
      continue;
    }

    const progId = 'prog-' + Date.now() + '-' + Math.random().toString(36).slice(2);
    container.insertAdjacentHTML('beforeend', '<div><small>' + escHtml(file.name) + ' (' + formatSize(file.size) + ')</small><div class="upload-progress"><div class="upload-progress-bar" id="' + progId + '"></div></div></div>');

    // 计算远端文件名（含当前子目录前缀）
    const fileName = currentSubdir ? currentSubdir + '/' + file.name : file.name;

    // 计算 SHA-256
    hashStatus.textContent = '计算 ' + file.name + ' SHA-256…';
    let fileChecksum;
    try {
      fileChecksum = await computeSHA256(file);
    } catch(e) {
      hashStatus.textContent = '';
      showToast(file.name + ' SHA-256 计算失败: ' + e.message, 'error');
      continue;
    }
    hashStatus.textContent = '';

    if (tunnelHexKey) {
      // 隧道模式：构造 multipart body，通过隧道发送
      try {
        const boundary = '----WebKitFormBoundary' + Math.random().toString(36).slice(2, 10);
        const fileBytes = await file.arrayBuffer();
        const headerStr = '--' + boundary + '\r\nContent-Disposition: form-data; name="file"; filename="' + fileName + '"\r\nContent-Type: application/octet-stream\r\n\r\n';
        const footerStr = '\r\n--' + boundary + '--\r\n';
        const encoder = new TextEncoder();
        const headerBytes = encoder.encode(headerStr);
        const footerBytes = encoder.encode(footerStr);
        const fullBody = new Uint8Array(headerBytes.length + fileBytes.byteLength + footerBytes.length);
        fullBody.set(headerBytes, 0);
        fullBody.set(new Uint8Array(fileBytes), headerBytes.length);
        fullBody.set(footerBytes, headerBytes.length + fileBytes.byteLength);

        document.getElementById(progId).style.width = '50%';
        const result = await tunnelRequest('POST', '/upload', { 'Content-Type': 'multipart/form-data; boundary=' + boundary, 'X-File-Checksum': fileChecksum }, fullBody);
        document.getElementById(progId).style.width = '100%';

        const data = JSON.parse(new TextDecoder().decode(result.body));
        if (result.status >= 200 && result.status < 300 && data.success) {
          showToast(file.name + ' 上传成功', 'success');
        } else {
          showToast(file.name + ' 上传失败: ' + (data.message || result.status), 'error');
        }
      } catch(e) {
        showToast(file.name + ' 上传失败: ' + e.message, 'error');
      }
    } else {
      // 直连模式
      const formData = new FormData();
      formData.append('file', file, fileName);

      try {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', BASE + '/upload', true);
        if (token) xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        xhr.setRequestHeader('X-File-Checksum', fileChecksum);
        xhr.upload.onprogress = function(e) {
          if (e.lengthComputable) {
            document.getElementById(progId).style.width = (e.loaded / e.total * 100) + '%';
          }
        };
        const resp = await new Promise(function(resolve, reject) {
          xhr.onload = function() { resolve(xhr); };
          xhr.onerror = function() { reject(new Error('网络错误')); };
          xhr.send(formData);
        });
        const data = JSON.parse(resp.responseText);
        if (resp.status >= 200 && resp.status < 300 && data.success) {
          showToast(file.name + ' 上传成功', 'success');
        } else {
          showToast(file.name + ' 上传失败: ' + (data.message || resp.status), 'error');
        }
      } catch(e) {
        showToast(file.name + ' 上传失败: ' + e.message, 'error');
      }
    }
  }
  container.innerHTML = '';
  refreshList();
}

// --- 文件列表 ---
async function refreshList() {
  const el = document.getElementById('file-list');
  el.innerHTML = '<div class="empty-msg">加载中...</div>';
  updateBreadcrumb();
  try {
    let files;
    const listUrl = '/api/files' + (currentSubdir ? '?subdir=' + encodeURIComponent(currentSubdir) : '');
    if (tunnelHexKey) {
      const result = await tunnelRequest('GET', listUrl, {}, null);
      const data = JSON.parse(new TextDecoder().decode(result.body));
      files = data.files || [];
    } else {
      const resp = await fetch(BASE + listUrl, { headers: headers() });
      const data = await resp.json();
      if (!resp.ok) { el.innerHTML = '<div class="empty-msg">加载失败: ' + (data.message || resp.status) + '</div>'; return; }
      files = data.files || [];
    }
    if (files.length === 0) { el.innerHTML = '<div class="empty-msg">暂无文件</div>'; return; }
    let html = '<table><thead><tr><th>文件名</th><th>大小</th><th>Checksum (SHA-256)</th><th>操作</th></tr></thead><tbody>';
    for (const fi of files) {
      const fullName = currentSubdir ? currentSubdir + '/' + fi.name : fi.name;
      if (fi.is_dir) {
        html += '<tr style="cursor:pointer;background:#f8f9fa;"><td onclick="navigateDir(\'' + escJsStr(fullName) + '\')"><strong>' + escHtml(fi.name) + '/</strong></td>' +
          '<td>-</td><td>-</td><td>' +
          '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();navigateDir(\'' + escJsStr(fullName) + '\')">进入</button>' +
          '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();rmdirDir(\'' + escJsStr(fullName) + '\')">删除</button></td></tr>';
      } else {
        const cs = fi.checksum || '';
        const csDisplay = cs ? '<span class="checksum-cell" title="' + escHtml(cs) + '" onclick="copyChecksum(\'' + escHtml(cs) + '\')">' + escHtml(getChecksumPrefix(cs)) + '<span class="copy-icon">📋</span></span>' : '-';
        html += '<tr><td class="overflow-dots" title="' + escHtml(fullName) + '">' + escHtml(fi.name) + '</td>' +
          '<td class="size-cell">' + formatSize(fi.size) + '</td>' +
          '<td>' + csDisplay + '</td>' +
          '<td class="file-actions">' +
          '<button class="btn btn-primary btn-sm" onclick="downloadFile(\'' + escJsStr(fullName) + '\', \'' + escJsStr(cs) + '\')">下载</button>' +
          '<button class="btn btn-danger btn-sm" onclick="deleteFile(\'' + escJsStr(fullName) + '\', \'' + escJsStr(cs) + '\')">删除</button>' +
          '</td></tr>';
      }
    }
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty-msg">请求失败: ' + e.message + '</div>';
  }
}

// --- 目录导航 ---
function navigateDir(subdir) {
  currentSubdir = subdir;
  refreshList();
}

function updateBreadcrumb() {
  const el = document.getElementById('dir-breadcrumb');
  if (!currentSubdir) {
    el.innerHTML = '<a href="javascript:void(0)" onclick="navigateDir(\'\')">/</a>';
    return;
  }
  const parts = currentSubdir.split('/');
  let html = '<a href="javascript:void(0)" onclick="navigateDir(\'\')">/</a>';
  let accumulated = '';
  for (let i = 0; i < parts.length; i++) {
    accumulated = accumulated ? accumulated + '/' + parts[i] : parts[i];
    html += ' <span style="color:#999">›</span> <a href="javascript:void(0)" onclick="navigateDir(\'' + escJsStr(accumulated) + '\')">' + escHtml(parts[i]) + '</a>';
  }
  el.innerHTML = html;
}

// --- 目录操作 ---
async function mkdirDir() {
  const input = document.getElementById('new-dir-name');
  const name = input.value.trim();
  if (!name) { showToast('请输入目录名', 'warning'); return; }
  const dirPath = currentSubdir ? currentSubdir + '/' + name : name;
  try {
    if (tunnelHexKey) {
      const result = await tunnelRequest('POST', '/mkdir?dirname=' + encodeURIComponent(dirPath), {}, null);
      const data = JSON.parse(new TextDecoder().decode(result.body));
      if (result.status >= 200 && result.status < 300 && data.success) {
        showToast('目录已创建: ' + dirPath, 'success');
        input.value = '';
        refreshList();
      } else {
        showToast('创建目录失败: ' + (data.message || result.status), 'error');
      }
    } else {
      const resp = await fetch(BASE + '/mkdir?dirname=' + encodeURIComponent(dirPath), {
        method: 'POST',
        headers: headers()
      });
      const data = await resp.json();
      if (resp.ok && data.success) {
        showToast('目录已创建: ' + dirPath, 'success');
        input.value = '';
        refreshList();
      } else {
        showToast('创建目录失败: ' + (data.message || resp.status), 'error');
      }
    }
  } catch(e) {
    showToast('创建目录失败: ' + e.message, 'error');
  }
}

// --- 下载（校验 checksum）---
async function downloadFile(name, expectedChecksum) {
  try {
    if (tunnelHexKey) {
      const result = await tunnelRequest('GET', '/download?filename=' + encodeURIComponent(name), {}, null);
      const serverCS = (result.headers['X-File-Checksum'] || [''])[0];

      if (serverCS) {
        try {
          const localCS = bytesToHex(await crypto.subtle.digest('SHA-256', result.body));
          if (localCS !== serverCS) {
            showToast(name + ' 校验失败: 服务端 ' + serverCS.substring(0,16) + '…, 本地 ' + localCS.substring(0,16) + '…', 'error');
            return;
          }
        } catch(e) {
          showToast(name + ' 校验失败: ' + e.message, 'warning');
        }
      }

      const blob = new Blob([result.body]);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast(name + ' 下载完成' + (serverCS ? '，校验通过' : ''), 'success');
    } else {
      const resp = await fetch(BASE + '/download?filename=' + encodeURIComponent(name), { headers: headers() });
      if (!resp.ok) {
        const data = await resp.json().catch(function() { return {}; });
        showToast('下载失败: ' + (data.message || resp.status), 'error');
        return;
      }
      const serverCS = resp.headers.get('X-File-Checksum') || '';
      const blob = await resp.blob();

      // 下载后校验 checksum
      if (serverCS) {
        try {
          const buffer = await blob.arrayBuffer();
          const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          const localCS = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
          if (localCS !== serverCS) {
            showToast(name + ' 校验失败: 服务端 ' + serverCS.substring(0,16) + '…, 本地 ' + localCS.substring(0,16) + '…', 'error');
            return;
          }
        } catch(e) {
          showToast(name + ' 校验失败: ' + e.message, 'warning');
        }
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast(name + ' 下载完成' + (serverCS ? '，校验通过' : ''), 'success');
    }
  } catch(e) {
    showToast('下载失败: ' + e.message, 'error');
  }
}

// --- 删除（带 checksum，走 POST /delete）---
async function deleteFile(name, checksum) {
  if (!confirm('确认删除 "' + name + '"?')) return;
  if (!checksum) {
    showToast('缺少 checksum，无法校验完整性', 'error');
    return;
  }
  try {
    if (tunnelHexKey) {
      const result = await tunnelRequest('POST', '/delete?filename=' + encodeURIComponent(name), { 'X-File-Checksum': checksum }, null);
      const data = JSON.parse(new TextDecoder().decode(result.body));
      if (result.status >= 200 && result.status < 300 && data.success) {
        showToast('删除成功: ' + name, 'success');
        refreshList();
      } else {
        showToast('删除失败: ' + (data.message || result.status), 'error');
      }
    } else {
      const resp = await fetch(BASE + '/delete?filename=' + encodeURIComponent(name), {
        method: 'POST',
        headers: headers({
          'X-File-Checksum': checksum
        })
      });
      const data = await resp.json();
      if (resp.ok && data.success) {
        showToast('删除成功: ' + name, 'success');
        refreshList();
      } else {
        showToast('删除失败: ' + (data.message || resp.status), 'error');
      }
    }
  } catch(e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + type + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

function formatSize(bytes) {
  if (bytes >= 1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
  if (bytes >= 1024) return (bytes/1024).toFixed(1) + ' KB';
  return bytes + ' B';
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJsStr(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

refreshList();
