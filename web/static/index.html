<style>
*, *::before, *::after { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 20px; background: #f5f7fa; color: #333; }
.container { max-width: 1000px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 24px; }
h1 { margin: 0 0 20px; font-size: 24px; }

<body>
<div class="container" id="app">
  <h1>sproxy 文件管理</h1>
  <div class="auth-bar">
    <label for="token">Token:</label>
    <input type="password" id="token" placeholder="可选，输入 Bearer Token">
    <button onclick="saveToken()">保存</button>
    <label for="tunnel-key" style="margin-left:16px;">Tunnel Key:</label>
    <input type="password" id="tunnel-key" placeholder="64位 hex 密钥，可选" style="flex:1.5;">
    <button onclick="saveTunnelKey()">保存</button>
  </div>
  <div class="toolbar">
    <label class="btn btn-primary" for="file-input" id="upload-btn-label">上传文件</label>
    <input type="file" id="file-input" multiple style="display:none" onchange="uploadFiles(this.files)">
    <button class="btn btn-secondary" onclick="refreshList()">刷新列表</button>
    <input type="text" id="search-input" placeholder="搜索文件…" style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:14px;flex:1;min-width:160px;" onkeydown="if(event.key==='Enter') searchFiles()">
    <button class="btn btn-primary" onclick="searchFiles()">搜索</button>
    <button class="btn btn-secondary" id="clear-search-btn" onclick="clearSearch()" style="display:none;">清除搜索</button>
  </div>
  <div id="dir-bar" style="margin-bottom:12px;padding:6px 12px;background:#f0f4ff;border-radius:4px;font-size:14px;display:flex;align-items:center;gap:8px;">
    <strong>目录：</strong><span id="dir-breadcrumb" style="flex:1;"><a href="javascript:void(0)" onclick="navigateDir('')">/</a></span>
    <input type="text" id="new-dir-name" placeholder="新建目录名" style="padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px;width:150px;">
    <button class="btn btn-sm btn-primary" onclick="mkdirDir()">新建</button>
  </div>
  <div id="upload-progress-container"></div>
  <div id="resume-container" style="margin-bottom:8px;display:none;"></div>
  <div id="file-list">
    <div class="empty-msg">加载中...</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const BASE = '';
let token = localStorage.getItem('sproxy_token') || '';
let tunnelHexKey = localStorage.getItem('sproxy_tunnel_key') || '';
let currentSubdir = localStorage.getItem('sproxy_subdir') || '';
document.getElementById('token').value = token;
document.getElementById('tunnel-key').value = tunnelHexKey;

// 缓存导入的 CryptoKey，避免重复导入
let _tunnelCryptoKey = null;

function saveToken() {
  token = document.getElementById('token').value;
  localStorage.setItem('sproxy_token', token);
  showToast('Token 已保存', 'success');
}

function saveTunnelKey() {
  tunnelHexKey = document.getElementById('tunnel-key').value;
  localStorage.setItem('sproxy_tunnel_key', tunnelHexKey);
  _tunnelCryptoKey = null;
  showToast('Tunnel Key 已保存', 'success');
}

// --- 隧道加解密 ---
async function getTunnelCryptoKey() {
  if (!tunnelHexKey) return null;
  if (_tunnelCryptoKey) return _tunnelCryptoKey;
  const raw = hexToBytes(tunnelHexKey);
  if (raw.length !== 32) {
    showToast('Tunnel Key 必须为 64 位 hex', 'error');
    return null;
  }
  _tunnelCryptoKey = await crypto.subtle.importKey('raw', raw, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
  return _tunnelCryptoKey;
}

function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2) {
    bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
  }
  return bytes;
}

function bytesToHex(bytes) {
  return Array.from(new Uint8Array(bytes)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function tunnelRequest(method, urlPath, headersObj, bodyBytes) {
  const key = await getTunnelCryptoKey();
  if (!key) throw new Error('未配置有效的 Tunnel Key');

  const meta = { method: method, url: urlPath, headers: {} };
  if (headersObj) {
    for (const [k, v] of Object.entries(headersObj)) {
      if (k !== 'Authorization') meta.headers[k] = v;
    }
  }

  const metaJSON = new TextEncoder().encode(JSON.stringify(meta));
  const metaIV = crypto.getRandomValues(new Uint8Array(12));
  const metaCT = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: metaIV }, key, metaJSON);
  const metaFrame = new Uint8Array(4 + metaIV.length + metaCT.byteLength);
  const dv = new DataView(metaFrame.buffer);
  dv.setUint32(0, metaIV.length + metaCT.byteLength, false);
  metaFrame.set(metaIV, 4);
  metaFrame.set(new Uint8Array(metaCT), 4 + metaIV.length);

  let bodyFrame = new Uint8Array(0);
  if (bodyBytes && bodyBytes.byteLength > 0) {
    const bodyIV = crypto.getRandomValues(new Uint8Array(12));
    const bodyCT = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: bodyIV }, key, bodyBytes);
    bodyFrame = new Uint8Array(4 + bodyIV.length + bodyCT.byteLength);
    const bdv = new DataView(bodyFrame.buffer);
    bdv.setUint32(0, bodyIV.length + bodyCT.byteLength, false);
    bodyFrame.set(bodyIV, 4);
    bodyFrame.set(new Uint8Array(bodyCT), 4 + bodyIV.length);
  }

  const fullBody = new Uint8Array(metaFrame.length + bodyFrame.length);
  fullBody.set(metaFrame, 0);
  fullBody.set(bodyFrame, metaFrame.length);

  const resp = await fetch(BASE + '/tunnel', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-tunnel-frame' },
    body: fullBody
  });
  if (!resp.ok) {
    throw new Error('隧道请求失败: HTTP ' + resp.status);
  }

  const respArrayBuf = await resp.arrayBuffer();
  const respBytes = new Uint8Array(respArrayBuf);

  if (respBytes.length < 4) throw new Error('响应数据不足');
  const respMetaLen = new DataView(respBytes.buffer).getUint32(0, false);
  const respMetaEnc = respBytes.slice(4, 4 + respMetaLen);

  const respMetaIV = respMetaEnc.slice(0, 12);
  const respMetaCT = respMetaEnc.slice(12);
  const respMetaPlain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: respMetaIV }, key, respMetaCT);
  const respMeta = JSON.parse(new TextDecoder().decode(respMetaPlain));

  const bodyStart = 4 + respMetaLen;
  let respBody = new Uint8Array(0);
  let offset = bodyStart;
  while (offset + 4 <= respBytes.length) {
    const bLen = new DataView(respBytes.buffer, offset).getUint32(0, false);
    if (bLen === 0 || offset + 4 + bLen > respBytes.length) break;
    const bEnc = respBytes.slice(offset + 4, offset + 4 + bLen);
    if (bEnc.length > 0) {
      const bIV = bEnc.slice(0, 12);
      const bCT = bEnc.slice(12);
      const chunk = new Uint8Array(await crypto.subtle.decrypt({ name: 'AES-GCM', iv: bIV }, key, bCT));
      const merged = new Uint8Array(respBody.length + chunk.length);
      merged.set(respBody, 0);
      merged.set(chunk, respBody.length);
      respBody = merged;
    }
    offset += 4 + bLen;
  }

  return {
    status: respMeta.status,
    headers: respMeta.headers || {},
    body: respBody
  };
}

// --- 纯 JS 增量 SHA-256 实现 ---
// 支持 update(Uint8Array) / digest('hex') 模式，避免 Web Crypto 需要完整 buffer
var Sha256 = (function() {
  var K = [
    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5,
    0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
    0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3,
    0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
    0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc,
    0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
    0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7,
    0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
    0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13,
    0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
    0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3,
    0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
    0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5,
    0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
    0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208,
    0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
  ];
  function Sha256() {
    this.h = [
      0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
      0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
    ];
    this._buf = [];  // buffered bytes
    this._len = 0;   // total bits processed
  }
  Sha256.prototype.update = function(data) {
    if (!data || !data.length) return this;
    this._len += data.length * 8;
    for (var i = 0; i < data.length; i++) {
      this._buf[this._buf.length] = data[i];
      if (this._buf.length === 64) {
        this._transform(this._buf);
        this._buf = [];
      }
    }
    return this;
  };
  Sha256.prototype.digest = function() {
    // padding: 0x80 + 0x00 * ... + 64-bit bit length
    var bits = this._len;
    var buf = this._buf.slice();
    buf.push(0x80);
    while (buf.length % 64 !== 56) buf.push(0x00);
    for (var i = 7; i >= 0; i--) buf.push((bits >>> (i * 8)) & 0xff);
    for (var i = 0; i < buf.length; i += 64) {
      this._transform(buf.slice(i, i + 64));
    }
    // produce hex output
    var hex = '';
    for (var i = 0; i < 8; i++) {
      for (var j = 3; j >= 0; j--) {
        var b = (this.h[i] >>> (j * 8)) & 0xff;
        hex += (b < 16 ? '0' : '') + b.toString(16);
      }
    }
    return hex;
  };
  Sha256.prototype._transform = function(m) {
    var w = new Array(64);
    for (var i = 0; i < 16; i++) {
      w[i] = (m[i*4] << 24) | (m[i*4+1] << 16) | (m[i*4+2] << 8) | m[i*4+3];
    }
    for (var i = 16; i < 64; i++) {
      var s0 = rot(w[i-15], 7) ^ rot(w[i-15], 18) ^ (w[i-15] >>> 3);
      var s1 = rot(w[i-2], 17) ^ rot(w[i-2], 19) ^ (w[i-2] >>> 10);
      w[i] = (w[i-16] + s0 + w[i-7] + s1) | 0;
    }
    var a = this.h[0], b = this.h[1], c = this.h[2], d = this.h[3];
    var e = this.h[4], f = this.h[5], g = this.h[6], hh = this.h[7];
    for (var i = 0; i < 64; i++) {
      var S1 = rot(e, 6) ^ rot(e, 11) ^ rot(e, 25);
      var ch = (e & f) ^ ((~e) & g);
      var t1 = (hh + S1 + ch + K[i] + w[i]) | 0;
      var S0 = rot(a, 2) ^ rot(a, 13) ^ rot(a, 22);
      var maj = (a & b) ^ (a & c) ^ (b & c);
      var t2 = (S0 + maj) | 0;
      hh = g; g = f; f = e; e = (d + t1) | 0;
      d = c; c = b; b = a; a = (t1 + t2) | 0;
    }
    this.h[0] = (this.h[0] + a) | 0;
    this.h[1] = (this.h[1] + b) | 0;
    this.h[2] = (this.h[2] + c) | 0;
    this.h[3] = (this.h[3] + d) | 0;
    this.h[4] = (this.h[4] + e) | 0;
    this.h[5] = (this.h[5] + f) | 0;
    this.h[6] = (this.h[6] + g) | 0;
    this.h[7] = (this.h[7] + hh) | 0;
  };
  function rot(x, n) { return (x >>> n) | (x << (32 - n)); }
  return Sha256;
})();

function headers(extra) {
  const h = extra || {};
  if (token && !tunnelHexKey) h['Authorization'] = 'Bearer ' + token;
  return h;
}

function getChecksumPrefix(cs) {
  if (!cs) return '-';
  return cs.substring(0, 16) + '…';
}

function copyChecksum(cs) {
  navigator.clipboard.writeText(cs).then(function() {
    showToast('Checksum 已复制到剪贴板', 'success');
  }).catch(function() {
    showToast('复制失败', 'error');
  });
}

function generateUploadId(filename, totalSize, lastModified, fileChecksum) {
  // 与 Go 客户端 generateUploadID 一致：SHA-256("filename|size|mtimeNano|checksum")[:32]
  const mtimeNano = (lastModified || Date.now()) * 1_000_000;
  const raw = filename + '|' + totalSize + '|' + mtimeNano + '|' + fileChecksum;
  const encoder = new TextEncoder();
  // 元数据很小，直接用 crypto.subtle.digest
  return crypto.subtle.digest('SHA-256', encoder.encode(raw)).then(function(hash) {
    return bytesToHex(new Uint8Array(hash)).substring(0, 32);
  });
}

const BASE_CHUNK_SIZE = 4 * 1024 * 1024; // 4 MiB
const MAX_CHUNK_SIZE = 64 * 1024 * 1024; // 64 MiB

// calcChunkSize 自适应分块大小，匹配 Go 客户端 pkg/client/chunked.go calcChunkSize 逻辑
function calcChunkSize(fileSize) {
  var chunkSize = BASE_CHUNK_SIZE;
  while (chunkSize * 512 < fileSize && chunkSize < MAX_CHUNK_SIZE) {
    chunkSize *= 2;
  }
  return Math.min(chunkSize, MAX_CHUNK_SIZE);
}

// --- 流式 SHA-256 (增量，不上大内存) ---
async function computeSHA256(file) {
  const sha256 = new Sha256();
  var chunkSize = Math.min(4 * 1024 * 1024, file.size || Infinity);
  var totalChunks = Math.ceil(file.size / chunkSize);
  for (var i = 0; i < totalChunks; i++) {
    var start = i * chunkSize;
    var end = Math.min(start + chunkSize, file.size);
    var buffer = await file.slice(start, end).arrayBuffer();
    sha256.update(new Uint8Array(buffer));
  }
  return sha256.digest();
}

async function computeSHA256Blob(blob) {
  if (blob.size <= 4 * 1024 * 1024) {
    var buf = await blob.arrayBuffer();
    var sha256 = new Sha256();
    sha256.update(new Uint8Array(buf));
    return sha256.digest();
  }
  // 大 blob 分块
  var sha256 = new Sha256();
  var cs = Math.min(4 * 1024 * 1024, blob.size);
  var tc = Math.ceil(blob.size / cs);
  for (var i = 0; i < tc; i++) {
    var s = i * cs;
    var e = Math.min(s + cs, blob.size);
    var b = await blob.slice(s, e).arrayBuffer();
    sha256.update(new Uint8Array(b));
  }
  return sha256.digest();
}

// --- localStorage 上传会话管理 ---
var SESSIONS_KEY = 'sproxy_upload_sessions';

function loadSessions() {
  try {
    return JSON.parse(localStorage.getItem(SESSIONS_KEY)) || {};
  } catch(e) { return {}; }
}

function saveSessions(sessions) {
  try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions)); } catch(e) {}
}

function saveUploadSession(uploadId, data) {
  var sessions = loadSessions();
  sessions[uploadId] = data;
  saveSessions(sessions);
}

function removeUploadSession(uploadId) {
  var sessions = loadSessions();
  delete sessions[uploadId];
  saveSessions(sessions);
}

// --- 分块上传 ---
async function chunkedUpload(file, tunnelMode, resumeSession) {
  var totalSize = file.size;
  var chunkSize = calcChunkSize(totalSize);
  var totalChunks = Math.ceil(totalSize / chunkSize);
  var fileName = currentSubdir ? currentSubdir + '/' + file.name : file.name;

  // 续传模式下使用已有 uploadId 和 fileChecksum
  var uploadId, fileChecksum;

  // 进度条创建
  var progId = 'prog-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  var container = document.getElementById('upload-progress-container');
  container.insertAdjacentHTML('beforeend',
    '<div id="' + progId + '-wrap"><small>' + escHtml(fileName) + ' (' + formatSize(totalSize) + ', ' + totalChunks + ' 分块)</small>' +
    '<div class="upload-progress"><div class="upload-progress-bar" id="' + progId + '"></div></div>' +
    '<div class="chunk-progress-text" id="' + progId + '-text">计算 SHA-256…</div></div>');
  var updateProg = function(loaded, total, chunkIdx) {
    var pct = total > 0 ? (loaded / total * 100) : 0;
    document.getElementById(progId).style.width = pct + '%';
    document.getElementById(progId + '-text').textContent =
      Math.round(pct) + '%（分块 ' + (chunkIdx + 1) + '/' + totalChunks + ', ' + formatSize(loaded) + '/' + formatSize(total) + '）';
  };

  if (resumeSession) {
    // 续传：使用已有 session 数据
    uploadId = resumeSession.uploadId;
    fileChecksum = resumeSession.fileChecksum;
    document.getElementById(progId + '-text').textContent = '续传中…';
  } else {
    // 新上传：流式计算完整文件 SHA-256（不上大内存）
    try {
      fileChecksum = await computeSHA256(file);
    } catch (e) {
      showToast(fileName + ' SHA-256 计算失败: ' + e.message, 'error');
      return;
    }
    // 生成确定性的 upload_id
    uploadId = await generateUploadId(fileName, totalSize, file.lastModified, fileChecksum);
  }

  try {
    // 初始化分块上传
    var initResult;
    var initBody = {
      upload_id: uploadId,
      filename: fileName,
      total_size: totalSize,
      chunk_size: chunkSize,
      total_chunks: totalChunks,
      file_checksum: fileChecksum
    };
    if (tunnelMode) {
      var initResp = await tunnelRequest('POST', '/upload/init',
        { 'Content-Type': 'application/json' },
        new TextEncoder().encode(JSON.stringify(initBody))
      );
      initResult = JSON.parse(new TextDecoder().decode(initResp.body));
    } else {
      var resp = await fetch(BASE + '/upload/init', {
        method: 'POST',
        headers: headers({ 'Content-Type': 'application/json' }),
        body: JSON.stringify(initBody)
      });
      initResult = await resp.json();
    }

    if (!initResult.success) {
      showToast(fileName + ' 初始化失败: ' + (initResult.message || 'unknown'), 'error');
      return;
    }

    if (initResult.upload_id === 'already_exists') {
      showToast(fileName + ' 已存在，跳过', 'success');
      return;
    }

    // 获取缺失的分块列表
    var missingChunks = null;
    if (initResult.upload_id && initResult.upload_id !== 'already_exists') {
      // 查询状态获取缺失分块
      var statusResp = await fetch(BASE + '/upload/status?upload_id=' + initResult.upload_id, { headers: headers() });
      if (statusResp.ok) {
        var statusData = await statusResp.json();
        if (statusData.success && statusData.missing_chunks) {
          missingChunks = statusData.missing_chunks;
        }
      }
    }

    var actualUploadId = initResult.upload_id;
    var uploadedBytes = 0;

    // 确定要上传的分块索引列表
    var chunkIndices;
    if (missingChunks && missingChunks.length > 0) {
      chunkIndices = missingChunks;
    } else if (resumeSession && resumeSession.completedChunks) {
      // 续传：跳过已上传的分块
      chunkIndices = [];
      for (var i = 0; i < totalChunks; i++) {
        if (resumeSession.completedChunks.indexOf(i) === -1) {
          chunkIndices.push(i);
        }
      }
    } else {
      chunkIndices = [];
      for (var i = 0; i < totalChunks; i++) chunkIndices.push(i);
    }

    // 保存 session 到 localStorage
    saveUploadSession(actualUploadId, {
      filename: fileName,
      totalSize: totalSize,
      chunkSize: chunkSize,
      totalChunks: totalChunks,
      fileChecksum: fileChecksum,
      lastModified: file.lastModified,
      uploadId: actualUploadId,
      completedChunks: resumeSession ? (resumeSession.completedChunks || []) : [],
      status: 'uploading',
      startedAt: Date.now()
    });
    var sessionData = loadSessions()[actualUploadId];
    if (!sessionData.completedChunks) sessionData.completedChunks = [];

    // 上传每个分块
    for (var ci = 0; ci < chunkIndices.length; ci++) {
      var idx = chunkIndices[ci];
      var start = idx * chunkSize;
      var end = Math.min(start + chunkSize, totalSize);

      // 单次读取：同一 buffer 既算 SHA-256 又用于上传
      var chunkBytes = await file.slice(start, end).arrayBuffer();
      var chunkData = new Uint8Array(chunkBytes);

      var chunkSha = new Sha256();
      chunkSha.update(chunkData);
      var chunkChecksum = chunkSha.digest();

      // 上传（含重试）
      var success = false;
      for (var retry = 0; retry < 3 && !success; retry++) {
        if (tunnelMode) {
          var boundary = '----WebKitFormBoundary' + Math.random().toString(36).slice(2, 10);
          var encoder = new TextEncoder();
          var headerStr = '--' + boundary + '\r\nContent-Disposition: form-data; name="upload_id"\r\n\r\n' + actualUploadId + '\r\n';
          var idxStr = '--' + boundary + '\r\nContent-Disposition: form-data; name="chunk_index"\r\n\r\n' + idx + '\r\n';
          var csStr = '--' + boundary + '\r\nContent-Disposition: form-data; name="chunk_checksum"\r\n\r\n' + chunkChecksum + '\r\n';
          var fileHeader = '--' + boundary + '\r\nContent-Disposition: form-data; name="chunk"; filename="' + String(idx).padStart(5, '0') + '.chunk"\r\nContent-Type: application/octet-stream\r\n\r\n';
          var footer = '\r\n--' + boundary + '--\r\n';
          var parts = [
            encoder.encode(headerStr), encoder.encode(idxStr), encoder.encode(csStr),
            encoder.encode(fileHeader), chunkData, encoder.encode(footer)
          ];
          var tlen = parts.reduce(function(s, p) { return s + p.byteLength; }, 0);
          var fullBody = new Uint8Array(tlen);
          var off = 0;
          for (var pi = 0; pi < parts.length; pi++) { fullBody.set(parts[pi], off); off += parts[pi].byteLength; }

          var treq = await tunnelRequest('POST', '/upload/chunk',
            { 'Content-Type': 'multipart/form-data; boundary=' + boundary }, fullBody);
          var result = JSON.parse(new TextDecoder().decode(treq.body));
        } else {
          var formData = new FormData();
          formData.append('upload_id', actualUploadId);
          formData.append('chunk_index', String(idx));
          formData.append('chunk_checksum', chunkChecksum);
          formData.append('chunk', new Blob([chunkBytes]), String(idx).padStart(5, '0') + '.chunk');

          var resp = await fetch(BASE + '/upload/chunk', {
            method: 'POST',
            headers: headers({}),
            body: formData
          });
          result = await resp.json();
        }

        if (result.success) {
          success = true;
          uploadedBytes += (end - start);
          updateProg(uploadedBytes, totalSize, idx);
          // 更新 localStorage
          if (sessionData.completedChunks.indexOf(idx) === -1) {
            sessionData.completedChunks.push(idx);
            saveUploadSession(actualUploadId, sessionData);
          }
        } else if (!result.should_retry) {
          showToast(fileName + ' 分块 ' + idx + ' 上传失败: ' + (result.message || 'unknown'), 'error');
          return;
        }
      }
      if (!success) {
        showToast(fileName + ' 分块 ' + idx + ' 上传失败（重试耗尽）', 'error');
        return;
      }
    }

    // 完成上传
    var completeResult;
    if (tunnelMode) {
      var cresp = await tunnelRequest('POST', '/upload/complete',
        { 'Content-Type': 'application/json' },
        new TextEncoder().encode(JSON.stringify({ upload_id: actualUploadId }))
      );
      completeResult = JSON.parse(new TextDecoder().decode(cresp.body));
    } else {
      var resp = await fetch(BASE + '/upload/complete', {
        method: 'POST',
        headers: headers({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ upload_id: actualUploadId })
      });
      completeResult = await resp.json();
    }

    if (completeResult.success) {
      showToast(fileName + ' 上传成功，校验通过', 'success');
      removeUploadSession(actualUploadId);
    } else {
      sessionData.status = 'failed';
      saveUploadSession(actualUploadId, sessionData);
      showToast(fileName + ' 合并失败: ' + (completeResult.message || 'unknown'), 'error');
    }
  } catch (e) {
    showToast(fileName + ' 分块上传失败: ' + e.message, 'error');
  }
}

// --- 下载（校验 checksum，大文件流式校验）---
async function downloadFile(name, expectedChecksum) {
  try {
    if (tunnelHexKey) {
      // 隧道模式：完整响应已在内存中
      var result = await tunnelRequest('GET', '/download?filename=' + encodeURIComponent(name), {}, null);
      var serverCS = (result.headers['X-File-Checksum'] || [''])[0];

      if (serverCS) {
        try {
          var sha256 = new Sha256();
          sha256.update(new Uint8Array(result.body));
          var localCS = sha256.digest();
          if (localCS !== serverCS) {
            showToast(name + ' 校验失败: 服务端 ' + serverCS.substring(0,16) + '…, 本地 ' + localCS.substring(0,16) + '…', 'error');
            return;
          }
        } catch(e) {
          showToast(name + ' 校验失败: ' + e.message, 'warning');
        }
      }

      var blob = new Blob([result.body]);
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast(name + ' 下载完成' + (serverCS ? '，校验通过' : ''), 'success');
    } else {
      var resp = await fetch(BASE + '/download?filename=' + encodeURIComponent(name), { headers: headers() });
      if (!resp.ok) {
        var data = await resp.json().catch(function() { return {}; });
        showToast('下载失败: ' + (data.message || resp.status), 'error');
        return;
      }
      var serverCS = resp.headers.get('X-File-Checksum') || '';
      var contentLength = parseInt(resp.headers.get('Content-Length') || '0');

      // 下载后校验 checksum（大文件用流式）
      if (serverCS) {
        try {
          var sha256 = new Sha256();
          if (contentLength > 100 * 1024 * 1024) {
            // 大文件：流式读取 response body
            var reader = resp.body.getReader();
            var readResult;
            while (!(readResult = await reader.read()).done) {
              sha256.update(new Uint8Array(readResult.value));
            }
            var localCS = sha256.digest();
            // 流式读取后 body 已被消费，重新下载
            if (localCS !== serverCS) {
              showToast(name + ' 校验失败: 服务端 ' + serverCS.substring(0,16) + '…, 本地 ' + localCS.substring(0,16) + '…', 'error');
              return;
            }
            // checksum 匹配，重新下载并保存
            var resp2 = await fetch(BASE + '/download?filename=' + encodeURIComponent(name), { headers: headers() });
            var blob2 = await resp2.blob();
            var url2 = URL.createObjectURL(blob2);
            var a2 = document.createElement('a');
            a2.href = url2;
            a2.download = name;
            document.body.appendChild(a2);
            a2.click();
            document.body.removeChild(a2);
            URL.revokeObjectURL(url2);
            showToast(name + ' 下载完成，校验通过', 'success');
            return;
          } else {
            // 小文件：直接用 blob
            var buffer = await resp.arrayBuffer();
            sha256.update(new Uint8Array(buffer));
            var localCS = sha256.digest();
            if (localCS !== serverCS) {
              showToast(name + ' 校验失败: 服务端 ' + serverCS.substring(0,16) + '…, 本地 ' + localCS.substring(0,16) + '…', 'error');
              return;
            }
            var blob = new Blob([buffer]);
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(name + ' 下载完成，校验通过', 'success');
            return;
          }
        } catch(e) {
          showToast(name + ' 校验失败: ' + e.message, 'warning');
        }
      }

      // 无 checksum 或校验出错：直接下载
      var blob = await resp.blob();
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast(name + ' 下载完成', 'success');
    }
  } catch(e) {
    showToast('下载失败: ' + e.message, 'error');
  }
}

// --- 删除（带 checksum，走 POST /delete）---
async function deleteFile(name, checksum) {
  if (!confirm('确认删除 "' + name + '"?')) return;
  if (!checksum) {
    showToast('缺少 checksum，无法校验完整性', 'error');
    return;
  }
  try {
    if (tunnelHexKey) {
      var result = await tunnelRequest('POST', '/delete?filename=' + encodeURIComponent(name), { 'X-File-Checksum': checksum }, null);
      var data = JSON.parse(new TextDecoder().decode(result.body));
      if (result.status >= 200 && result.status < 300 && data.success) {
        showToast('删除成功: ' + name, 'success');
        refreshList();
      } else {
        showToast('删除失败: ' + (data.message || result.status), 'error');
      }
    } else {
      var resp = await fetch(BASE + '/delete?filename=' + encodeURIComponent(name), {
        method: 'POST',
        headers: headers({
          'X-File-Checksum': checksum
        })
      });
      var data = await resp.json();
      if (resp.ok && data.success) {
        showToast('删除成功: ' + name, 'success');
        refreshList();
      } else {
        showToast('删除失败: ' + (data.message || resp.status), 'error');
      }
    }
  } catch(e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

// --- 重命名（带 checksum，走 POST /rename）---
async function renameFile(name, checksum) {
  if (!checksum) {
    showToast('缺少 checksum，无法校验完整性', 'error');
    return;
  }
  var newName = prompt('新的文件名（路径）:', name);
  if (!newName || newName === name) return;

  try {
    if (tunnelHexKey) {
      var result = await tunnelRequest('POST', '/rename?from=' + encodeURIComponent(name) + '&to=' + encodeURIComponent(newName), { 'X-File-Checksum': checksum }, null);
      var data = JSON.parse(new TextDecoder().decode(result.body));
      if (result.status >= 200 && result.status < 300 && data.success) {
        showToast('重命名成功: ' + newName, 'success');
        refreshList();
      } else {
        showToast('重命名失败: ' + (data.message || result.status), 'error');
      }
    } else {
      var resp = await fetch(BASE + '/rename?from=' + encodeURIComponent(name) + '&to=' + encodeURIComponent(newName), {
        method: 'POST',
        headers: headers({
          'X-File-Checksum': checksum
        })
      });
      var data = await resp.json();
      if (resp.ok && data.success) {
        showToast('重命名成功: ' + newName, 'success');
        refreshList();
      } else {
        showToast('重命名失败: ' + (data.message || resp.status), 'error');
      }
    }
  } catch(e) {
    showToast('重命名失败: ' + e.message, 'error');
  }
}

// --- 续传检测（页面加载时调用）---
function checkResumableUploads() {
  var sessions = loadSessions();
  var hasResumable = false;
  for (var uploadId in sessions) {
    var data = sessions[uploadId];
    if (data.status !== 'uploading') continue;
    hasResumable = true;

    (function(sessionData, sessUploadId) {
      // 查询服务端状态
      var statusUrl = '/upload/status?upload_id=' + sessUploadId + '&filename=' + encodeURIComponent(sessionData.filename);
      fetch(BASE + statusUrl, { headers: headers() })
        .then(function(r) { return r.json(); })
        .then(function(status) {
          if (status.success && !status.finished && status.missing_chunks && status.missing_chunks.length > 0) {
            showResumePrompt(sessionData, sessUploadId);
          } else if (status.success && status.finished) {
            // 服务端已完成，清除本地记录
            removeUploadSession(sessUploadId);
          } else {
            // session 已过期
            removeUploadSession(sessUploadId);
          }
        })
        .catch(function() {
          removeUploadSession(sessUploadId);
        });
    })(data, uploadId);
  }
  if (!hasResumable) {
    var el = document.getElementById('resume-container');
    if (el) el.style.display = 'none';
  }
}

function showResumePrompt(data, uploadId) {
  var el = document.getElementById('resume-container');
  if (!el) return;
  el.style.display = 'block';
  var div = document.createElement('div');
  div.style.cssText = 'padding:8px 12px;background:#f0fff0;border-radius:4px;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;';
  div.innerHTML = '<span style="flex:1;">📦 未完成的上传: <strong>' + escHtml(data.filename) + '</strong> (' + (data.completedChunks ? data.completedChunks.length : 0) + '/' + data.totalChunks + ' 分块)</span>' +
    '<input type="file" id="resume-file-' + uploadId + '" style="display:none" onchange="resumeUpload(\'' + uploadId + '\', this.files[0])">' +
    '<button class="resume-btn" onclick="document.getElementById(\'resume-file-' + uploadId + '\').click()">选择文件续传</button>' +
    '<button class="btn btn-sm btn-secondary" onclick="dismissResume(\'' + uploadId + '\')">忽略</button>';
  el.appendChild(div);
}

function dismissResume(uploadId) {
  removeUploadSession(uploadId);
  var el = document.getElementById('resume-container');
  if (el) el.innerHTML = '';
  checkResumableUploads();
}

async function resumeUpload(uploadId, file) {
  if (!file) return;
  var sessions = loadSessions();
  var data = sessions[uploadId];
  if (!data) { showToast('续传数据已丢失', 'error'); return; }

  // 校验文件匹配
  if (file.size !== data.totalSize) {
    showToast('文件大小不匹配，无法续传', 'error');
    return;
  }

  // 快速校验：计算文件 SHA-256 并与 session 记录比对
  try {
    var checksum = await computeSHA256(file);
    if (checksum !== data.fileChecksum) {
      showToast('文件内容不匹配（SHA-256 不一致），无法续传', 'error');
      return;
    }
  } catch(e) {
    showToast('SHA-256 计算失败: ' + e.message, 'error');
    return;
  }

  showToast('文件校验通过，开始续传…', 'success');

  // 设置 currentSubdir 匹配续传文件的目录
  var parts = data.filename.split('/');
  if (parts.length > 1) {
    currentSubdir = parts.slice(0, -1).join('/');
    localStorage.setItem('sproxy_subdir', currentSubdir);
  }

  await chunkedUpload(file, !!tunnelHexKey, data);

  var resumeContainer = document.getElementById('resume-container');
  if (resumeContainer) resumeContainer.innerHTML = '';
  checkResumableUploads();
  refreshList();
}

function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + type + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

function formatSize(bytes) {
  if (bytes >= 1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
  if (bytes >= 1024) return (bytes/1024).toFixed(1) + ' KB';
  return bytes + ' B';
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJsStr(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

// 初始化
refreshList();
checkResumableUploads();
</script>
