# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# v2.8+ schema
version: 2

project_name: sproxy

before:
  hooks:
    - go mod tidy
    - go fmt ./...

builds:
  - id: sproxy
    main: ./cmd/sproxy
    binary: sproxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -w -s
      - -X main.Version={{ .Version }}
      - -X main.BuildAt={{ .Date }}

  - id: sclient
    main: ./cmd/sclient
    binary: sclient
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -w -s
      - -X main.Version={{ .Version }}
      - -X main.BuildAt={{ .Date }}

archives:
  - id: default
    builds:
      - sproxy
      - sclient
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        format: zip
    files:
      - config.example.yaml
      - README.md
      - LICENSE
      - docs/*.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "新功能"
      regexp: "^feat(\\s*\\(.*\\))?:"
      order: 0
    - title: "缺陷修复"
      regexp: "^fix(\\s*\\(.*\\))?:"
      order: 1
    - title: "性能优化"
      regexp: "^perf(\\s*\\(.*\\))?:"
      order: 2
    - title: "代码重构"
      regexp: "^refactor(\\s*\\(.*\\))?:"
      order: 3
    - title: "其他"
      order: 999

release:
  github:
    owner: cocomhub
    name: sproxy
  draft: true
  prerelease: auto
  header: |
    ## sproxy {{ .Version }} ({{ .Date }})

    发布的二进制包含 sproxy 服务端和 sclient 客户端。

    ### 安装方式

    ```bash
    # 方式一：下载预编译二进制
    # 从 Assets 选择对应平台下载，解压后即可使用

    # 方式二：Go install
    go install github.com/cocomhub/sproxy/cmd/sproxy@{{ .Tag }}
    go install github.com/cocomhub/sproxy/cmd/sclient@{{ .Tag }}
    ```

  footer: |
    **完整变更日志**: https://github.com/cocomhub/sproxy/compare/{{ .PreviousTag }}...{{ .Tag }}

